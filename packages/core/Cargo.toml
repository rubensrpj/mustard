[package]
name = "mustard-core"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Shared foundation crate for the Mustard hook/script/CLI Rust migration: event model, hook contract, and pipeline-state types."
license = "MIT"
publish = false

# Dependency versions are declared once in the workspace `[workspace.dependencies]`
# table (root Cargo.toml); each crate references them with `{ workspace = true }`.
[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
thiserror = { workspace = true }
# SHA-256 for `model::provenance::tree_checksum` — the artifact-update engine
# fingerprints vendored template trees. Not a workspace dep: `mustard-core` is
# the only consumer. Latest stable on crates.io, May 2026.
sha2 = "0.10.9"
# Data-parallelism for `atomic_md::store::scan_dir` when >50 files. Optional
# feature so consumers that do not need parallel scan pay no compile cost.
rayon = { workspace = true, optional = true }
# BPE tokenizer used by `economy::estimator` to approximate Anthropic Claude
# token counts via cl100k_base — accuracy is ±5%, never bit-exact. Pulled
# through the workspace table; see the rationale in the root Cargo.toml.
tiktoken-rs = { workspace = true }
# Multi-pattern string matching for `vocabulary::VocabularyMatcher`. The
# automaton matches all needles in a single linear pass over the haystack
# (O(n + m)), which is roughly an order of magnitude faster than running 100
# independent `str::contains` calls or compiling a regex alternation. Pinned
# to 1.1; the 1.x line has been API-stable since 2023 and the dep already
# appears in the lock file transitively (via `tiktoken-rs`).
aho-corasick = "1.1"
# TOML deserializer for `.claude/vocab/regression.toml` — the runtime-editable
# vocabulary file consumed by `VocabLayer::parse_from_toml`. The 0.8 line is
# the current stable major on crates.io (May 2026); the dep is crate-local
# because `vocabulary` is the only consumer today.
toml = "0.8"
# Tree-sitter: agnostic AST extraction. Three-tier grammar acquisition
# (functional refactor 2026-05): (1) common grammars compiled IN-CRATE below
# (offline, no `cc`); (2) WASM grammars acquired on demand via `WasmStore` for
# any other language (added with the `wasm` feature in a later step); (3) the
# textual floor (Aho-Corasick) when neither is available — so the layer stays
# agnostic without ever failing on an unknown stack. `tree-sitter-loader` still
# discovers user-installed grammars from `~/.config/tree-sitter/` for
# extensibility. Pinning a closed in-crate set is NOT an agnostic violation:
# it is a precision optimisation; the textual floor remains the universal path.
tree-sitter = "0.26"
tree-sitter-loader = "0.26"
# Common grammars compiled in-crate (resolved via `LANGUAGE.into()`), pinned to
# versions whose ABI is <= tree-sitter 0.26. Languages outside this set fall to
# WASM-on-demand or the textual floor.
tree-sitter-rust = "0.24.2"
tree-sitter-typescript = "0.23.2"
tree-sitter-python = "0.25.0"
tree-sitter-go = "0.25.0"
tree-sitter-java = "0.23.5"
tree-sitter-c-sharp = "0.23.5"
# Line-based textual diff for `regression_check` — used as fallback when no
# tree-sitter grammar is installed for the file's language. The 2.x line is
# stable since 2023; resolves to 2.7.0 on crates.io (May 2026). Spec A Wave 2
# pins this version explicitly.
similar = "2"
# HTTP client for the OPTIONAL `wasm-grammars` feature only: it downloads
# pinned `tree-sitter-<lang>.wasm` blobs on demand into `~/.mustard/grammars/`.
# `optional = true` + `dep:ureq` in the feature means the DEFAULT build never
# compiles it; the WASM-acquisition path is the sole consumer. Pulled through
# the workspace table (same `3.3` the CLI/rt faces already use).
ureq = { workspace = true, optional = true }

# Optional, OFF by default. `wasm-grammars` turns on `tree-sitter/wasm`, which
# pulls `wasmtime` (heavy build, needs a C/LLVM toolchain on some hosts), plus
# the `ureq` HTTP client used to fetch pinned grammar blobs. The default gate
# (build/test) never pays this cost; with the feature off, the native
# (in-crate + tree-sitter-loader) path is byte-for-byte identical and the
# textual floor still covers every other language. See
# `domain::ast::wasm_acquire`.
[features]
wasm-grammars = ["tree-sitter/wasm", "dep:ureq"]

[dev-dependencies]
insta = { workspace = true }
# Temp directories for io-layer round-trip tests (event store, pipeline repo,
# atomic fs) and config/env tests. Test-only — never compiled into the library.
tempfile = { workspace = true }

# Inherit the workspace lint table (pedantic = warn, unwrap_used = deny,
# unsafe_code = forbid). See the root Cargo.toml `[workspace.lints]`.
[lints]
workspace = true
