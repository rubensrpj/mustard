# Built-in architectural-layer signal vocabulary.
#
# Embedded into `mustard-core` via `include_str!` (see
# `vocabulary::architecture::BUILTIN_ARCHITECTURE_TOML`). It is the *guaranteed
# base* for `detect_architecture_signals`: architecture-style detection works
# offline with no project-local file present.
#
# An on-disk `.claude/vocab/architecture.toml` overrides this base wholesale —
# see `ArchitectureVocabulary::load`.
#
# Schema: one `[[role]]` table-array entry per architectural role, each carrying
# a `role` (one of `domain`, `application`, `infrastructure`, `presentation`,
# `ports`, `adapters`) and its literal folder / path-segment `signals`. Signals
# are matched case-insensitively as **path segments** (the caller lowercases the
# segment and tests equality / boundary), so they are short, stack-agnostic
# directory names, NOT regexes. Order across roles is priority order: the first
# role listed wins a cross-role segment collision.

[[role]]
role = "domain"
signals = [
    "domain",
    "entities",
    "entity",
    "model",
    "models",
    "core",
]

[[role]]
role = "application"
signals = [
    "application",
    "app",
    "usecases",
    "use_cases",
    "use-cases",
    "services",
    "service",
    "handlers",
    "handler",
    "commands",
    "queries",
    "interactors",
]

[[role]]
role = "infrastructure"
signals = [
    "infrastructure",
    "infra",
    "persistence",
    "repositories",
    "repository",
    "repos",
    "data",
    "db",
    "gateways",
    "external",
]

[[role]]
role = "presentation"
signals = [
    "presentation",
    "controllers",
    "controller",
    "api",
    "web",
    "http",
    "ui",
    "views",
    "view",
    "routes",
    "endpoints",
]

[[role]]
role = "ports"
signals = [
    "ports",
    "port",
    "interfaces",
    "boundaries",
]

[[role]]
role = "adapters"
signals = [
    "adapters",
    "adapter",
]
