# Built-in framework / ORM / DI-decorator signal vocabulary.
#
# Embedded into `mustard-core` via `include_str!` (see
# `vocabulary::frameworks::BUILTIN_FRAMEWORKS_TOML`). It is the *guaranteed
# base* for `detect_framework_signals`: framework detection works offline with
# no project-local file present.
#
# An on-disk `.claude/vocab/frameworks.toml` (or any named vocab) overrides
# this base term-for-term — see `FrameworkVocabulary::load`.
#
# Schema: one `[[signal]]` table-array entry per category, each carrying a
# `category` (one of `orm`, `framework`, `di`) and its literal `patterns`.
# Patterns are matched case-sensitively as substrings via Aho-Corasick in a
# single pass — they are signals, not full grammars, so deliberately short and
# stack-agnostic. Order across categories is priority order: the first category
# listed wins a cross-category term collision.

[[signal]]
category = "orm"
patterns = [
    # Drizzle (TS)
    "pgTable(",
    "mysqlTable(",
    "sqliteTable(",
    # TypeORM / NestJS / JPA / .NET attributes
    "@Entity",
    "@Table",
    # Diesel (Rust)
    "#[derive(Queryable",
    "#[derive(Insertable",
    # Entity Framework (.NET)
    "DbSet<",
    "DbContext",
    # GORM (Go)
    "gorm.Model",
    # Mongoose (Node)
    "mongoose.model(",
    # Sequelize / generic active-record base classes. Aho-Corasick matches
    # literal substrings (no regex), so the signal is the literal
    # `extends Model` — it fires on `class User extends Model { ... }`.
    # Also covers Laravel Eloquent's `class User extends Model`.
    "extends Model",
    # Laravel Eloquent — the qualified base-class import that a model file
    # carries even when its subclass line is reformatted.
    "Illuminate\\Database\\Eloquent\\Model",
    # SQLAlchemy (Python)
    "SQLAlchemy",
    "declarative_base",
]

[[signal]]
category = "framework"
patterns = [
    # Rust web frameworks
    "actix_web",
    "axum::",
    "rocket::",
    # Python web frameworks
    "FastAPI(",
    "Flask(",
    # Node
    "express(",
    # Spring (Java)
    "@SpringBootApplication",
    "@RestController",
    # ASP.NET
    "[ApiController]",
    # Go web frameworks
    "gin.",
    "fiber.",
    # Laravel (PHP). The `Illuminate\` root namespace appears in framework
    # imports; `Route::` is the routing facade; `extends Controller` is the
    # base-controller subclass line; `artisan` is the console entry-point that
    # ships in source (the repo-root `artisan` file and Console kernel), not
    # only in composer.json — so it fires on real code content.
    "Illuminate\\",
    "Route::",
    "extends Controller",
    "artisan",
]

[[signal]]
category = "di"
patterns = [
    # Angular / NestJS / Spring DI + decorator signals
    "@Injectable",
    "@Component",
    "@Controller",
    "@Service",
    "@Repository",
    "@Module",
    "@Autowired",
]
