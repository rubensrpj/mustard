[package]
name = "mustard-rt"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"
description = "Mustard enforcement runtime: a single binary that replaces the per-hook `node` processes — a dispatcher running enforcement modules behind the `mustard-core` Check/Observer contract."
license = "MIT"
publish = false

[[bin]]
name = "mustard-rt"
path = "src/main.rs"

# Dependency versions live in the workspace `[workspace.dependencies]` table
# (root Cargo.toml); each crate references them with `{ workspace = true }`.
[dependencies]
mustard-core = { path = "../core" }
serde = { workspace = true }
serde_json = { workspace = true }
clap = { workspace = true }

# The `otel-collector` / `diagnose-otel` ports (Wave 6) need a local OTLP/JSON
# receiver and a SQLite store. `tiny_http` is a minimal blocking HTTP server
# with no tokio/async runtime; `rusqlite` with the `bundled` feature compiles
# SQLite into the binary so `mustard-rt` stays a single self-contained file.
#
# `rusqlite` is pinned to `0.31` — the same version `apps/dashboard/src-tauri`
# uses. `libsqlite3-sys` carries `links = "sqlite3"`, and Cargo permits only
# one package linking a given native library per workspace; matching the
# version lets Cargo unify both crates onto a single `libsqlite3-sys 0.28`.
tiny_http = "0.12"
rusqlite = { version = "0.31", features = ["bundled"] }

# `tempfile` backs the `bash_guard` parity tests that need a throwaway git
# repo / project dir on disk. Test-only — never linked into the binary.
[dev-dependencies]
tempfile = { workspace = true }

# Inherit the workspace lint table (pedantic = warn, unwrap_used = deny,
# unsafe_code = forbid). See the root Cargo.toml `[workspace.lints]`.
[lints]
workspace = true
