name: CI

on:
  push:
    branches: [main, dev_rubens]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (Linux)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: Lint (zero warnings)
        run: pnpm exec eslint src/ --max-warnings=0

      - name: Type-check strict
        run: pnpm exec tsc --noEmit --strict -p tsconfig.json

      - name: Unit tests
        run: bun test tests/unit/

      - name: Integration tests
        run: bun test tests/integration/

      - name: Benchmarks (advisory)
        continue-on-error: true
        run: |
          pnpm run bench
          bun tests/bench/regression-check.cjs

  windows:
    name: Test (Windows — advisory)
    runs-on: windows-latest
    continue-on-error: true
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        working-directory: .
        run: pnpm install --frozen-lockfile

      - name: TypeScript build
        run: pnpm build

      - name: EventStore tests (bun:sqlite on Windows)
        run: bun test tests/unit/event-store/
