# bump-on-main вЂ” versГЈo automГЎtica da era plugin: CADA merge na main
# incrementa o PATCH do plugin (plugin/.claude-plugin/plugin.json), commita,
# tagueia vX.Y.Z e despacha o workflow Release NO REF DA TAG вЂ” lГЎ dentro,
# `github.ref_type == 'tag'` satisfaz o gate do job `publish`, e a conferГЄncia
# "tag == plugin.json" passa por construГ§ГЈo (o bump acabou de gravar ambos).
#
# Por que o despacho explГ­cito (`gh workflow run`): a tag Г© empurrada com o
# GITHUB_TOKEN, e o GitHub NГѓO dispara workflows a partir de pushes feitos com
# esse token (anti-recursГЈo) вЂ” sem o despacho, a tag nasceria muda. O mesmo
# mecanismo garante que o commit de bump nГЈo re-dispara este workflow nem a CI;
# o guard por mensagem abaixo Г© cinto-e-suspensГіrio para o caso de um humano
# empurrar um commit `chore(release):` manualmente.
#
# O selo vai para AS DUAS pernas. O bump nasce na main; o Гєltimo passo o
# propaga para o `dev`. Sem isso o `dev` nunca aprende a prГіpria versГЈo
# publicada: fica N commits atrГЎs para sempre (DOIS por release вЂ” o merge de
# promoГ§ГЈo + este bump) e todo binГЎrio compilado dele sai carimbado com uma
# versГЈo velha, fazendo o aviso de version-drift do harness resmungar sozinho.
# A propagaГ§ГЈo SETA o valor (nГЈo faz cherry-pick), entГЈo Г© idempotente e
# converge mesmo depois de divergГЄncia acumulada.
name: Bump on main

on:
  push:
    branches: [main]

permissions:
  contents: write
  actions: write

concurrency:
  group: bump-on-main
  cancel-in-progress: false

jobs:
  bump:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump PATCH do plugin.json, tag, despacho do Release e selo no dev
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          manifest=plugin/.claude-plugin/plugin.json
          pv=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$manifest" | head -1)
          IFS=. read -r ma mi pa <<<"$pv"
          nv="$ma.$mi.$((pa+1))"
          echo "bump: $pv -> $nv"
          sed -i "s/\"version\": \"$pv\"/\"version\": \"$nv\"/" "$manifest"
          grep -q "\"version\": \"$nv\"" "$manifest"   # o sed realmente aplicou

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "$manifest"
          git commit -m "chore(release): v$nv вЂ” bump automГЎtico pГіs-merge na main"
          # Rebase ANTES da tag: se outro merge entrou no meio-tempo, o commit
          # de bump Г© reescrito e a tag precisa apontar para o sha final.
          git pull --rebase origin main
          git tag -a "v$nv" -m "Mustard v$nv"
          git push origin main "v$nv"

          gh workflow run release.yml --ref "v$nv"
          echo "Release despachado no ref v$nv"

          # --- Propagar o selo para o dev ---------------------------------
          # Por Гєltimo de propГіsito: se esta parte falhar, o release jГЎ estГЎ
          # publicado e Г­ntegro. SETAMOS o valor (nГЈo cherry-pick) para ser
          # idempotente e imune Г  divergГЄncia jГЎ acumulada вЂ” o dev converge
          # para $nv venha de onde vier.
          git fetch origin dev
          git checkout -B dev-sync "origin/dev"
          dv=$(sed -n 's/.*"version"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p' "$manifest" | head -1)
          if [ "$dv" = "$nv" ]; then
            echo "dev jГЎ estГЎ em v$nv вЂ” nada a propagar"
          else
            sed -i "s/\"version\": \"$dv\"/\"version\": \"$nv\"/" "$manifest"
            grep -q "\"version\": \"$nv\"" "$manifest"   # o sed realmente aplicou
            git add "$manifest"
            git commit -m "chore(release): v$nv вЂ” sincroniza o selo de versГЈo no dev"
            if git push origin "dev-sync:dev"; then
              echo "dev sincronizado: $dv -> $nv"
            else
              # Corrida com um push humano no dev. NГЈo falha o job: o release
              # jГЎ saiu, e o prГіximo bump re-sincroniza sozinho (SETA o valor).
              echo "::warning::nГЈo consegui propagar v$nv para o dev (corrida?); o prГіximo release re-sincroniza"
            fi
          fi
