# Build-system manifests — DATA, not logic.
#
# grain's src/ contains no manifest filename, build-system label, or skip-dir
# literal. To support a new build system: add a [[manifest]] row here. Only a
# brand-new file FORMAT (beyond json/xml/toml/yaml/lines) needs an engine change.
#
# Directories the scanner skips (build/dependency output, plus the harness's
# own .claude state/tooling — scanning it is self-referential noise) live here too.

skip_dirs = [".git", ".claude", "node_modules", "target", "bin", "obj", "dist", "build", ".dart_tool", "vendor"]

# Fields per manifest:
#   kind            label stored on the project (free-form, from the repo's world)
#   filename / ext  match by exact filename OR by extension(s)
#   format          generic reader: json | xml-attr | xml-text | toml-sections | yaml-section | gomod
#   name            project name rule: "dir" (parent folder) | "stem" (filename without ext)
#   deps            selector(s) for dependencies (meaning depends on format)
#   scripts         (json) object path whose entries are build/codegen scripts
#   element / attr  (xml) element name / attribute holding the dependency
#   module_pattern  (gomod) regex capturing this unit's own module path
#   dep_pattern     (gomod) regex capturing each dependency

[[manifest]]
kind = "npm"
filename = "package.json"
format = "json"
name = "dir"
deps = ["dependencies", "devDependencies", "peerDependencies"]
scripts = "scripts"

[[manifest]]
kind = "composer"
filename = "composer.json"
format = "json"
name = "dir"
deps = ["require", "require-dev"]
scripts = "scripts"

[[manifest]]
kind = "dotnet"
ext = ["csproj", "fsproj"]
format = "xml-attr"
name = "stem"
element = "PackageReference"
attr = "Include"

[[manifest]]
kind = "pub"
filename = "pubspec.yaml"
format = "yaml-section"
name = "dir"
deps = ["dependencies", "dev_dependencies"]

[[manifest]]
kind = "go"
filename = "go.mod"
format = "gomod"
name = "dir"
module_pattern = '^\s*module\s+(\S+)'
dep_pattern = '^\s*([\w./-]+)\s+v[\d.]'

[[manifest]]
kind = "maven"
filename = "pom.xml"
format = "xml-text"
name = "dir"
element = "artifactId"

[[manifest]]
kind = "cargo"
filename = "Cargo.toml"
format = "toml-sections"
name = "dir"
deps = ["dependencies", "dev-dependencies", "build-dependencies"]
