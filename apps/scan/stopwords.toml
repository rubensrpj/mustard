# Term-index stopwords — the ONLY place a glue word is declared.
#
# English function words that occur inside identifiers as pure glue
# ("LoadAndParse", "FromDisk", "GetUserWithRoles") and would otherwise dominate
# the digest's domain-term index by sheer frequency, crowding out the repo's
# actual vocabulary. The term index never indexes them, and `query` ignores
# them as query tokens.
#
# Inclusion rule (why exactly these words):
#   * closed-class English words only — conjunctions, prepositions, articles,
#     pronouns, auxiliaries/modals, quantifiers: words that cannot name a
#     domain concept on their own;
#   * plus the bare accessor prefixes `get`/`set`, which name an access
#     pattern, never a concept;
#   * open-class verbs/nouns (new, add, list, create, build, ...) are NOT
#     listed: they can be genuine domain vocabulary ("AddOn", "BuildPlan"),
#     and the rarity-ranked query already demotes them when they act as glue;
#   * only words of >= 3 chars appear — the tokenizer already drops shorter
#     tokens (to, of, in, by, is, on, at, or, an, as, ...).
#
# Like languages.toml, this is DATA embedded at compile time (include_str!):
# tuning the vocabulary is a data change, never a logic change in src/.

