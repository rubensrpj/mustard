# Machine-written-file catalog — the ONLY place a code generator, lockfile
# basename or vendored-tree convention is declared.
#
# The engine (src/classify.rs) stays generic: it knows four CLASSES
# ("generated" | "vendored" | "lockfile" | "minified") and three probes —
#   * content marker: a literal/regex searched in the first `head_lines` lines
#     (covers the leading comment banner of every comment syntax without the
#     engine knowing any of them);
#   * path glob: matched against the /-normalized path relative to the root;
#   * minified: average-line-length statistic (probed LAST — an explicit
#     marker is stronger provenance than arithmetic).
# Repo overrides (.gitattributes `linguist-generated`, .editorconfig
# `generated_code`) always WIN over this catalog, in both directions — see
# classify::Overrides.
#
# Supporting a new generator banner, lockfile or vendored dir is a data row
# here, never logic in src/. Literals are matched ASCII-case-insensitively,
# regexes are compiled case-insensitive, globs match case-insensitively. Rows
# are probed in document order and the first match wins (deterministic).
#
# The @ escape below keeps THIS file from carrying the literal
# at-generated marker itself — tools honoring the convention (linguist, diff
# minimizers) would otherwise class the catalog as generated output.

# Lines scanned for content markers — generous enough to clear a license
# header that precedes the generator banner.
head_lines = 30

[index]
# Digest term-index weight for occurrences inside generated|vendored modules:
# their terms stay findable (a query must still land, answered with reason
# "generated_only" when nothing hand-written matches) but never outrank
# hand-written code. Applied per module as max(1, floor(count * multiplier)).
generated_multiplier = 0.25

[minified]
# Machine-compacted output: long average lines, and enough bytes that the
# average is meaningful (a short one-liner is not minified).
avg_line_len = 400
min_bytes = 1024

# Lockfiles by basename (compared ASCII-lowercased). Machine-resolved
# dependency pins: never vocabulary, never an anchor — they leave the digest
# index entirely.
lockfiles = [
  "bun.lock",
  "bun.lockb",
  "cargo.lock",
  "composer.lock",
  "flake.lock",
  "gemfile.lock",
  "go.sum",
  "gradle.lockfile",
  "package-lock.json",
  "packages.lock.json",
  "pipfile.lock",
  "pnpm-lock.yaml",
  "poetry.lock",
  "uv.lock",
  "yarn.lock",
]

# --- content markers (head of file) ------------------------------------------

[[marker]]
class = "generated"
# The cross-ecosystem at-marker convention (honored by linguist, Phabricator,
# Prettier, many generators). Unicode-escaped — see the header note.
literal = "\u0040generated"

[[marker]]
class = "generated"
# Go ecosystem convention: "Code generated by <tool>. DO NOT EDIT."
# (protoc-gen-go, mockgen, stringer, sqlc, oapi-codegen, ...).
regex = "Code generated .* DO NOT EDIT"

[[marker]]
class = "generated"
# .NET tooling banner: "<auto-generated>" / "<auto-generated />" XML doc tag
# (resx designers, T4 templates, EF migrations scaffolding).
literal = "<auto-generated"

[[marker]]
class = "generated"
# protoc's own banner in the C++/Java/Python outputs.
literal = "generated by the protocol buffer compiler"

[[marker]]
class = "generated"
# Kubb — OpenAPI client/types generator for TypeScript.
literal = "generated by kubb"

[[marker]]
class = "generated"
# orval — OpenAPI client generator ("Generated by orval v…").
literal = "generated by orval"

[[marker]]
class = "generated"
# OpenAPI Generator banner ("by OpenAPI Generator (https://openapi-generator.tech)").
literal = "openapi generator"

# --- path globs ---------------------------------------------------------------

[[path]]
class = "generated"
# Relay/GraphQL-codegen style output trees.
glob = "**/__generated__/**"

[[path]]
class = "generated"
# Conventional codegen output directory.
glob = "**/src/gen/**"

[[path]]
class = "generated"
# WinForms/resx designer-owned partial files.
glob = "**/*.Designer.cs"

[[path]]
class = "vendored"
# Vendored third-party trees committed into the repo. (`vendor/` itself is
# usually pruned by manifests.toml skip_dirs; this covers the rest.)
glob = "**/third_party/**"

[[path]]
class = "vendored"
glob = "**/extern/**"
