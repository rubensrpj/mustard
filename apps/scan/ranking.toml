# Relevance-ranking parameters — the ONLY place a ranking constant is tuned.
#
# Like stopwords.toml and generated-markers.toml, this is DATA embedded at
# compile time (include_str!): adjusting how the digest ranks term samples and
# anchor files is a data change, never a logic change in src/. Nothing here
# names a language, framework or architecture — these are corpus-relative
# statistics only.
#
# All values are converted ONCE at load into fixed-point integers (x1024);
# every score comparison afterwards is pure integer arithmetic, so rankings
# stay byte-stable across runs and platforms.

[bm25]
# Okapi BM25 over the term index. tf = the term's occurrences in a module's
# declarations; document length = the module's declaration count; avgdl = the
# average declaration count over indexed modules.
#   k1: term-frequency saturation — higher lets repetition keep paying off.
#   b:  document-length normalization strength in [0, 1] — 1.0 fully punishes
#       sprawling modules, 0.0 ignores length entirely.
k1 = 1.2
b = 0.75

[anchors]
# Anchor ranking is BM25F — FIELDED retrieval over the matched terms. A
# candidate file is a module that DECLARES at least one matched term (anchor-
# eligible, non-test); a path hit ALONE never admits one, so a hub named after a
# domain it does not implement stays in `hubs`, never here (its grouped evidence
# still rides in `report.terms[].files`). Each candidate scores the Σ over the
# matched terms of:
#     idf(term) * BM25( path_boost * in-path + in-declarations , doc_len )
# i.e. two fields — the module's DECLARATIONS and its PATH/filename. Fielding the
# path lets a query that NAMES a path segment lift the files under that path,
# while BM25's length-normalization + tf saturation stop a sprawling god/seed
# file that merely mentions many common terms from compounding (the field bug the
# old flat Σ-idf had: a seeder co-occurring with several common terms outscoring
# the focused file). idf is the PARAMETER-FREE corpus
# rarity (`core::domain::ranking::idf_x1024`); the lone knob below is:
#   path_boost: how many declaration-occurrences one path/filename match is
#       worth. Like the BM25 tuning, the ranking is not sensitive to the exact
#       value (a small integer >= 2 is plenty); 0 disables the path field.
path_boost = 5

[catalog]
# Kind-class weights for the PUBLISHED catalog ranking only. A declaration
# whose kind appears in `type_kinds` (the engine's generic capture vocabulary
# — the `@definition.<kind>` suffixes the queries emit, listed here as DATA)
# contributes `type_weight` per occurrence; every other kind (members:
# methods, fields, …) contributes `member_weight`. This protects the
# published MAX_TERMS cap from member-name flooding — type names are the
# entity vocabulary a request maps onto first. Ranking only: the published
# `count` stays the demoted occurrence count, and BM25 sample/anchor scoring
# is untouched.
type_weight = 2.5
member_weight = 1.0
type_kinds = ["class", "interface", "struct", "enum", "trait", "type", "record"]

[samples]
# Per-term sample-slot selection. Stratification is parameter-free: when at
# least two strata (the model's projects[].dir) carry a candidate, each is
# guaranteed one slot; a single-project repo degenerates to the global
# ranking with no effect. The REMAINING slots are filled by greedy MMR:
#   score = lambda * relevance - (1 - lambda) * max-similarity-to-picked
# where similarity blends path-subtoken Jaccard, shared directory depth and
# import-neighborhood Jaccard in equal parts. lambda in [0, 1]: 1.0 is pure
# relevance, lower buys more diversity.
mmr_lambda = 0.75
# MMR cost/determinism bound: only the top (mmr_pool_per_slot x slots)
# candidates by relevance compete for the remaining slots, so a term living
# in thousands of modules stays cheap to sample.
mmr_pool_per_slot = 8
